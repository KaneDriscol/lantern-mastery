<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lantern: Website UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body style="margin:0">
<div id="root"></div>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="TechniquesScreen.jsx"></script>
<script type="text/babel" src="PracticeScreen.jsx"></script>
<script type="text/babel" src="ResourcesScreen.jsx"></script>
<script type="text/babel">
const ds = window.LanternDesignSystem_b388cd;
function App() {
  const [page, setPage] = React.useState('home');
  const { TopNav } = ds;
  const screens = {
    home: <window.HomeScreen ds={ds} go={setPage} />,
    techniques: <window.TechniquesScreen ds={ds} />,
    practice: <window.PracticeScreen ds={ds} />,
    resources: <window.ResourcesScreen ds={ds} />,
  };
  const navMap = { home: 'Traditions', techniques: 'Techniques', practice: 'Practice', resources: 'Resources' };
  const reverseMap = { Traditions: 'home', Techniques: 'techniques', Practice: 'practice', Resources: 'resources' };
  return (
    <div style={{background:'var(--canvas)',minHeight:'100vh'}}>
      <TopNav activeLink={navMap[page]} onNavigate={(l) => setPage(reverseMap[l] || 'home')} onLearnNow={() => setPage('techniques')} />
      {screens[page]}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
