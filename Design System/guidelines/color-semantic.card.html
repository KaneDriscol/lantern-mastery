<link rel="stylesheet" href="../styles.css">
<div style="display:flex;height:100px;font-family:var(--font-sans);font-size:12px;color:#fff">
<div style="flex:1;background:var(--accent-steel);display:flex;align-items:flex-end;padding:8px">accent-steel</div>
<div style="flex:1;background:var(--accent-gold);display:flex;align-items:flex-end;padding:8px;color:var(--ink)">accent-gold</div>
<div style="flex:1;background:var(--success);display:flex;align-items:flex-end;padding:8px">success</div>
<div style="flex:1;background:var(--warning);display:flex;align-items:flex-end;padding:8px">warning</div>
<div style="flex:1;background:var(--error);display:flex;align-items:flex-end;padding:8px">error</div>
</div>
