<!-- @dsCard group="Brand" viewport="700x140" name="Lantern Mark + Wordmark" subtitle="Torch glyph, never inverted within the wordmark itself" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;gap:32px;padding:16px;align-items:center">
<div style="background:var(--canvas);padding:16px;display:flex;align-items:flex-end;gap:4px;border:1px solid var(--hairline);border-radius:8px">
<img src="../assets/lantern-mark.svg" width="34" height="34" style="filter:invert(0.35) sepia(1) saturate(3) hue-rotate(-20deg)">
<span style="font-family:var(--font-serif-display);font-size:22px;color:var(--ink)">Lantern</span>
</div>
<div style="background:var(--surface-dark);padding:16px;display:flex;align-items:flex-end;gap:4px;border-radius:8px">
<img src="../assets/lantern-mark.svg" width="34" height="34" style="filter:invert(1)">
<span style="font-family:var(--font-serif-display);font-size:22px;color:var(--on-dark)">Lantern</span>
</div>
</div>
