<!-- @dsCard group="Brand" viewport="700x180" name="Surface Rhythm (Pacing)" subtitle="Cream → cream-card → dark-illustration → cream → bronze-callout → dark-footer" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;height:100px;font-family:var(--font-sans);font-size:11px">
<div style="flex:1;background:var(--canvas);display:flex;align-items:flex-end;padding:6px;color:var(--muted);border:1px solid var(--hairline)">cream</div>
<div style="flex:1;background:var(--surface-card);display:flex;align-items:flex-end;padding:6px;color:var(--muted)">cream-card</div>
<div style="flex:1;background:var(--surface-dark);display:flex;align-items:flex-end;padding:6px;color:var(--on-dark-soft)">dark</div>
<div style="flex:1;background:var(--canvas);display:flex;align-items:flex-end;padding:6px;color:var(--muted);border:1px solid var(--hairline)">cream</div>
<div style="flex:1;background:var(--primary);display:flex;align-items:flex-end;padding:6px;color:var(--on-primary)">bronze</div>
<div style="flex:1;background:var(--surface-dark);display:flex;align-items:flex-end;padding:6px;color:var(--on-dark-soft)">footer</div>
</div>
